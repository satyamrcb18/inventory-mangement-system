<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Inventify Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 420px; padding: 2.5rem; text-align: center; }
        .login-logo { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .login-logo .logo-icon { width: 48px; height: 48px; box-shadow: 0 0 30px var(--accent-glow); }
        .login-logo .logo-icon i { width: 24px; height: 24px; }
        .login-title { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .login-subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem; }
        .login-error { color: var(--status-danger-text); background: var(--status-danger-bg); padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; border: 1px solid rgba(239, 68, 68, 0.2); display: none; }
        
        .auth-buttons { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .btn-google { background: #fff; color: #1f2937; justify-content: center;}
        .btn-google:hover { background: #f3f4f6; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(255,255,255,0.1); }
        .btn-phone { background: var(--bg-surface-hover); color: white; justify-content: center; border: 1px solid var(--border-highlight); }
        
        /* OTP Form Hidden initially */
        #phone-otp-section { display: none; text-align: left; margin-top: 1.5rem; animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        #recaptcha-container { margin-bottom: 1rem; display: flex; justify-content: center; }
        
        #email-link-section { display: none; text-align: left; margin-top: 1.5rem; animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

        .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--text-secondary); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }
        
        #verify-otp-section { display: none; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="app-background">
        <div class="blob blob-1" style="top: -100px; right: 10%;"></div>
        <div class="blob blob-2" style="bottom: -100px; left: 10%;"></div>
    </div>
    
    <div class="login-wrapper">
        <div class="login-box premium-glass premium-border modal-entrance">
            <div class="login-logo">
                <div class="logo-icon"><i data-lucide="layers"></i></div>
                <div>
                    <h2 class="login-title">Admin Access</h2>
                    <p class="login-subtitle">Sign in securely</p>
                </div>
            </div>
            
            <div class="login-error" id="login-error">
                <i data-lucide="alert-circle" style="width: 14px; height: 14px; display:inline-block; vertical-align:middle; margin-right:4px;"></i>
                <span id="error-text">Authentication Error</span>
            </div>

            <!-- Login Methods -->
            <div class="auth-buttons" id="primary-auth-methods">
                <button class="btn btn-primary action-hover" id="btn-show-email" style="justify-content: center; width: 100%;">
                    <i data-lucide="mail"></i> Continue with Email
                </button>
                <div class="divider">OR</div>
                <button class="btn btn-google action-hover" id="btn-google-login">
                    <svg style="width:18px;height:18px;margin-right:8px;" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                    Continue with Google
                </button>
                <button class="btn btn-phone action-hover" id="btn-show-phone" style="display:none;">
                    <i data-lucide="smartphone"></i> Continue with Phone
                </button>
            </div>
            
            <!-- Email Magic Link Section -->
            <div id="email-link-section">
                <button id="btn-back-email" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;margin-bottom:1rem;display:flex;align-items:center;font-size:0.85rem;"><i data-lucide="arrow-left" style="width:14px;height:14px;margin-right:4px;"></i> Back</button>
                
                <div id="request-email-section">
                    <div class="form-group">
                        <label class="form-label" style="text-align:left;">Email Address</label>
                        <input type="email" id="emailInput" class="form-input" placeholder="admin@example.com" required>
                    </div>
                    <button class="btn btn-primary action-hover" id="btn-send-email-link" style="width:100%; justify-content:center;">Send Magic Link</button>
                </div>
            </div>

            <!-- Phone Number / OTP Section -->
            <div id="phone-otp-section">
                <button id="btn-back" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;margin-bottom:1rem;display:flex;align-items:center;font-size:0.85rem;"><i data-lucide="arrow-left" style="width:14px;height:14px;margin-right:4px;"></i> Back</button>
                
                <div id="request-otp-section">
                    <div class="form-group">
                        <label class="form-label" style="text-align:left;">Phone Number</label>
                        <input type="tel" id="phoneNumber" class="form-input" placeholder="+91 9876543210" required>
                    </div>
                    <div id="recaptcha-container"></div>
                    <button class="btn btn-primary action-hover" id="btn-send-otp" style="width:100%; justify-content:center;">Send OTP</button>
                </div>
                
                <div id="verify-otp-section">
                    <div class="form-group">
                        <label class="form-label" style="text-align:left;">Enter 6-digit OTP</label>
                        <input type="text" id="otpCode" class="form-input" placeholder="123456" maxLength="6" required autocomplete="one-time-code">
                    </div>
                    <button class="btn btn-success action-hover" id="btn-verify-otp" style="width:100%; justify-content:center;">Verify & Login</button>
                </div>
            </div>
            
        </div>
    </div>
    
    <!-- Use Type Module for Firebase V9 -->
    <script type="module" src="login.js"></script>
</body>
</html>
